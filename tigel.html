<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вечерний Тигель — AWARA</title>

  <!-- Основной CSS -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(10,6,30,0.9), transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(201,120,40,0.15), transparent 45%),
        radial-gradient(ellipse at 20% 80%, rgba(245,158,11,0.14), transparent 45%),
        linear-gradient(180deg, #020010 0%, #050318 40%, #03061a 100%),
        #000;
      color: #dcd2be;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url('assets/starfield.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.7;
    }

    /* === КОНТЕЙНЕР === */
    .tigel-container {
      position: relative;
      z-index: 1;
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 10px 10px 30px;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 3vw, 18px);
    }

    /* === ХЕДЕР === */
    .tigel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 16px;
      background: rgba(2,1,10,0.5);
      backdrop-filter: blur(10px);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      background: rgba(2,1,10,0.45);
      color: #c9a84c;
      text-decoration: none;
    }
    .back-btn:hover { transform: scale(1.1); }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: #c9a84c;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .header-subtitle {
      font-size: 9px;
      color: rgba(201,168,76,0.4);
      letter-spacing: 0.12em;
      font-family: 'JetBrains Mono', monospace;
    }

    /* === СЕКЦИЯ: ФОРМА === */
    .tigel-section {
      padding: 16px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(18,14,30,0.55), rgba(5,3,16,0.45));
      position: relative;
      overflow: hidden;
    }
    .tigel-section::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
    }
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: #c9a84c;
      letter-spacing: 0.15em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
    }

    /* === TEXTAREA === */
    .tigel-textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      color: #dcd2be;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }
    .tigel-textarea::placeholder {
      color: rgba(201,168,76,0.3);
      font-style: italic;
    }
    .tigel-textarea:focus {
      border-color: rgba(201,168,76,0.6);
      box-shadow: 0 0 20px rgba(201,168,76,0.08);
    }

    /* === КНОПКИ ВЫБОРА (эмоции / стихии) === */
    .choice-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .choice-btn {
      padding: 10px 4px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      color: rgba(201,168,76,0.6);
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1.3;
    }
    .choice-btn:hover {
      border-color: rgba(201,168,76,0.5);
      color: #c9a84c;
    }
    .choice-btn.active {
      border-color: #c9a84c;
      color: #ffd700;
      background: rgba(201,168,76,0.12);
      box-shadow: 0 0 12px rgba(201,168,76,0.15);
    }

    /* === КНОПКА СОХРАНЕНИЯ === */
    .save-btn {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      background: rgba(201,168,76,0.12);
      border: 2px solid #c9a84c;
      border-radius: 12px;
      color: #c9a84c;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      min-height: 48px;
    }
    .save-btn:hover {
      background: rgba(201,168,76,0.22);
      border-color: #ffd700;
      color: #ffd700;
    }
    .save-btn:active {
      transform: scale(0.98);
    }

    /* === ЗАПИСИ === */
    .tigel-entries {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tigel-entry {
      padding: 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 12px;
      animation: entryFadeIn 0.4s ease both;
    }
    .entry-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(201,168,76,0.4);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .entry-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: rgba(220,210,190,0.9);
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .entry-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .entry-tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .entry-tag.emotion {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: rgba(180,140,255,0.8);
    }
    .entry-tag.element {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      color: rgba(201,168,76,0.7);
    }

    /* === ПУСТОЕ СОСТОЯНИЕ === */
    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: rgba(201,168,76,0.3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    /* === СЧЁТЧИК === */
    .entry-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(201,168,76,0.5);
    }

    /* === АНИМАЦИИ === */
    @keyframes entryFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === АДАПТИВ === */
    @media (max-width: 375px) {
      .header-title { font-size: 13px; }
      .choice-grid { grid-template-columns: repeat(3, 1fr); }
      .choice-btn { font-size: 11px; padding: 8px 4px; }
      .tigel-textarea { font-size: 14px; min-height: 100px; }
      .save-btn { font-size: 12px; }
      .entry-text { font-size: 13px; }
    }
    @media (max-width: 320px) {
      .choice-grid { grid-template-columns: repeat(3, 1fr); }
      .choice-btn { font-size: 10px; padding: 7px 3px; }
      .tigel-container { padding: 8px 6px 24px; }
    }
    @media (min-width: 768px) {
      .choice-grid { gap: 10px; }
      .choice-btn { font-size: 13px; padding: 12px 6px; }
    }
  </style>
</head>
<body>

<div class="tigel-container">
  <!-- ХЕДЕР -->
  <div class="tigel-header">
    <div class="header-left">
      <a href="index.html" class="back-btn" title="Назад в лобби">&#9664;</a>
      <div>
        <div class="header-title">Вечерний Тигель</div>
        <div class="header-subtitle">алхимия дня</div>
      </div>
    </div>
    <div class="entry-count" id="entry-count">0 записей</div>
  </div>

  <!-- ФОРМА ЗАПИСИ -->
  <div class="tigel-section">
    <div class="section-label">
      <span>&#9671;</span>
      Алхимия дня — преврати опыт в свет
    </div>
    <textarea id="tigel-note" class="tigel-textarea" placeholder="Что важного произошло сегодня?" rows="6"></textarea>

    <!-- Эмоции -->
    <div class="section-label" style="margin-top:16px;">
      <span>&#9670;</span>
      Эмоция
    </div>
    <div class="choice-grid" id="emotion-grid">
      <button class="choice-btn" data-emotion="радость">радость</button>
      <button class="choice-btn" data-emotion="спокойствие">спокойствие</button>
      <button class="choice-btn" data-emotion="вдохновение">вдохновение</button>
      <button class="choice-btn" data-emotion="усталость">усталость</button>
      <button class="choice-btn" data-emotion="благодарность">благодарность</button>
    </div>

    <!-- Стихии У-Син -->
    <div class="section-label" style="margin-top:16px;">
      <span>&#9670;</span>
      Стихия У-Син
    </div>
    <div class="choice-grid" id="element-grid">
      <button class="choice-btn" data-element="дерево">дерево</button>
      <button class="choice-btn" data-element="огонь">огонь</button>
      <button class="choice-btn" data-element="земля">земля</button>
      <button class="choice-btn" data-element="металл">металл</button>
      <button class="choice-btn" data-element="вода">вода</button>
    </div>

    <!-- Кнопка сохранения -->
    <button id="tigel-save" class="save-btn">Превратить в свет</button>
  </div>

  <!-- ПОСЛЕДНИЕ ЗАПИСИ -->
  <div class="tigel-section">
    <div class="section-label">
      <span>&#9671;</span>
      Последние записи
    </div>
    <div id="tigel-list" class="tigel-entries"></div>
  </div>
</div>

<!-- МОДУЛИ -->
<script type="module">
  import { addTigelEntry, getTigelEntries } from './js/state-module.js';
  import { showToast } from './js/ui-module.js';

  // === СОСТОЯНИЕ ===
  let selectedEmotion = null;
  let selectedElement = null;

  // === ВЫБОР ЭМОЦИИ ===
  document.getElementById('emotion-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-emotion]');
    if (!btn) return;
    document.querySelectorAll('[data-emotion]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEmotion = btn.dataset.emotion;
  });

  // === ВЫБОР СТИХИИ ===
  document.getElementById('element-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-element]');
    if (!btn) return;
    document.querySelectorAll('[data-element]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedElement = btn.dataset.element;
  });

  // === СОХРАНЕНИЕ ЗАПИСИ ===
  document.getElementById('tigel-save').addEventListener('click', () => {
    const textarea = document.getElementById('tigel-note');
    const note = textarea.value.trim();

    if (!note) {
      showToast('Напиши хотя бы пару слов');
      return;
    }

    const count = addTigelEntry({
      note: note,
      emotion: selectedEmotion,
      element: selectedElement
    });

    // Очистить форму
    textarea.value = '';
    selectedEmotion = null;
    selectedElement = null;
    document.querySelectorAll('[data-emotion], [data-element]').forEach(b => b.classList.remove('active'));

    // Перерисовать записи
    renderEntries();

    showToast('Запись сохранена. Всего записей: ' + count);
    console.log('[Tigel] Запись добавлена. Всего:', count);
  });

  // === ОТРИСОВКА ЗАПИСЕЙ ===
  function renderEntries() {
    const entries = getTigelEntries(10);
    const list = document.getElementById('tigel-list');
    const countEl = document.getElementById('entry-count');

    // Обновляем счётчик (показываем общее количество)
    const allEntries = getTigelEntries(9999);
    const totalCount = allEntries.length;
    countEl.textContent = totalCount + ' ' + pluralize(totalCount);

    if (entries.length === 0) {
      list.innerHTML = '<div class="empty-state">Записей пока нет. Напиши, что произошло сегодня.</div>';
      return;
    }

    // Показываем от новых к старым
    const reversed = [...entries].reverse();
    list.innerHTML = reversed.map((entry, i) => {
      const date = new Date(entry.timestamp);
      const dateStr = formatDate(date);
      const tags = [];
      if (entry.emotion) {
        tags.push('<span class="entry-tag emotion">' + entry.emotion + '</span>');
      }
      if (entry.element) {
        tags.push('<span class="entry-tag element">' + entry.element + '</span>');
      }
      return (
        '<div class="tigel-entry" style="animation-delay:' + (i * 0.06) + 's;">' +
        '<div class="entry-date">' + dateStr + '</div>' +
        '<div class="entry-text">' + escapeHtml(entry.note) + '</div>' +
        (tags.length ? '<div class="entry-tags">' + tags.join('') + '</div>' : '') +
        '</div>'
      );
    }).join('');
  }

  // === ФОРМАТИРОВАНИЕ ДАТЫ ===
  function formatDate(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return day + '.' + month + '.' + year + ' ' + hours + ':' + minutes;
  }

  // === СКЛОНЕНИЕ СЛОВА "ЗАПИСЕЙ" ===
  function pluralize(n) {
    const mod10 = n % 10;
    const mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 19) return 'записей';
    if (mod10 === 1) return 'запись';
    if (mod10 >= 2 && mod10 <= 4) return 'записи';
    return 'записей';
  }

  // === ЭКРАНИРОВАНИЕ HTML ===
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // === ИНИЦИАЛИЗАЦИЯ ===
  renderEntries();
  console.log('[Tigel] Экран Вечернего Тигеля загружен');
</script>

</body>
</html>
