<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вселенная · AWARA</title>

  <!-- Основной CSS -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(10,6,30,0.9), transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(124,58,237,0.18), transparent 45%),
        radial-gradient(ellipse at 20% 80%, rgba(245,158,11,0.14), transparent 45%),
        linear-gradient(180deg, #020010 0%, #050318 40%, #03061a 100%),
        #000;
      color: #dcd2be;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url('assets/starfield.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.7;
    }

    /* === КОНТЕЙНЕР === */
    .universe-container {
      position: relative;
      z-index: 1;
      width: min(480px, 100%);
      margin: 0 auto;
      padding: 10px 10px 30px;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 3vw, 18px);
    }

    /* === ХЕДЕР === */
    .universe-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 16px;
      background: rgba(2,1,10,0.5);
      backdrop-filter: blur(10px);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
      min-width: 44px; min-height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      background: rgba(2,1,10,0.45);
      color: #c9a84c;
      text-decoration: none;
    }
    .back-btn:hover { transform: scale(1.1); }
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: #c9a84c;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .header-subtitle {
      font-size: 9px;
      color: rgba(201,168,76,0.4);
      letter-spacing: 0.12em;
      font-family: 'JetBrains Mono', monospace;
    }

    /* === CANVAS ОБЛАСТЬ === */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-height: min(480px, calc(100vw - 20px));
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow:
        0 0 0 1px rgba(255,215,80,0.04),
        0 20px 80px rgba(0,0,0,0.6),
        inset 0 0 60px rgba(201,168,76,0.02);
    }
    .canvas-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,215,80,0.06);
    }
    #universe-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: pointer;
    }

    /* === ПАНЕЛЬ АГЕНТА === */
    .agent-panel {
      padding: 16px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(18,14,30,0.72), rgba(8,5,18,0.62));
      display: none;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .agent-panel.visible { display: block; }
    .agent-panel::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,80,0.45), transparent);
    }
    .agent-panel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .agent-panel-icon {
      font-size: clamp(24px, 6vw, 32px);
      filter: drop-shadow(0 0 10px rgba(201,168,76,0.5));
    }
    .agent-panel-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(14px, 3.5vw, 18px);
      color: #ffd700;
      letter-spacing: 0.14em;
    }
    .agent-panel-domain {
      font-size: 10px;
      color: rgba(201,168,76,0.5);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
    }
    .agent-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .agent-detail {
      padding: 10px 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 8px;
      text-align: center;
    }
    .agent-detail-label {
      font-size: 8px;
      color: rgba(201,168,76,0.45);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .agent-detail-value {
      font-size: 12px;
      color: rgba(255,248,214,0.85);
      font-family: 'Cormorant Garamond', serif;
    }

    /* === ПАНЕЛЬ ПРОГРЕССИИ === */
    .progression-panel {
      padding: 16px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(18,14,30,0.55), rgba(5,3,16,0.45));
      position: relative;
      overflow: hidden;
    }
    .progression-panel::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.4), transparent);
    }
    .progression-header {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: #c9a84c;
      letter-spacing: 0.15em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .level-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .level-icon {
      font-size: 18px;
      width: 28px;
      text-align: center;
      filter: drop-shadow(0 0 6px currentColor);
    }
    .level-info { flex: 1; }
    .level-name {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
    .level-subtitle {
      font-size: 9px;
      color: rgba(201,168,76,0.4);
      font-family: 'JetBrains Mono', monospace;
    }
    .level-light {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(0,255,170,0.7);
      text-align: right;
    }
    .level-progress-bar {
      height: 3px;
      background: rgba(201,168,76,0.08);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .level-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(124,58,237,0.5), rgba(201,168,76,0.7));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* === НАВИГАЦИЯ === */
    .nav-hint {
      text-align: center;
      font-size: 9px;
      color: rgba(201,168,76,0.3);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* === АДАПТИВ === */
    @media (max-width: 375px) {
      .agent-details { grid-template-columns: repeat(2, 1fr); }
      .header-title { font-size: 13px; }
      .agent-detail-label { font-size: 7px; }
      .agent-detail-value { font-size: 10px; }
      .level-name { font-size: 10px; }
    }
  </style>
</head>
<body>

<div class="universe-container">
  <!-- ══ ХЕДЕР ══ -->
  <div class="universe-header">
    <div class="header-left">
      <a href="index.html" class="back-btn" title="Назад в лобби">◀</a>
      <div>
        <div class="header-title">Вселенная</div>
        <div class="header-subtitle" id="universe-subtitle">космос игрока</div>
      </div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(201,168,76,0.5);" id="agent-count">0/21</div>
  </div>

  <!-- ══ CANVAS ВСЕЛЕННОЙ ══ -->
  <div class="canvas-wrapper">
    <canvas id="universe-canvas"></canvas>
  </div>

  <!-- ══ ПАНЕЛЬ ВЫБРАННОГО АГЕНТА ══ -->
  <div class="agent-panel" id="agent-panel">
    <div class="agent-panel-header">
      <div class="agent-panel-icon" id="agent-panel-icon">✦</div>
      <div>
        <div class="agent-panel-name" id="agent-panel-name">Выбери агента</div>
        <div class="agent-panel-domain" id="agent-panel-domain">кликни по звёздному телу</div>
      </div>
    </div>
    <div class="agent-details" id="agent-details"></div>
  </div>

  <!-- ══ ПАНЕЛЬ ПРОГРЕССИИ ══ -->
  <div class="progression-panel" id="progression-panel">
    <div class="progression-header">
      <span>◈</span>
      ПРОГРЕССИЯ ВСЕЛЕННОЙ
    </div>
    <div id="progression-levels"></div>
  </div>

  <div class="nav-hint">
    кликни по агенту — увидишь его карточку · нажми ◀ чтобы вернуться в лобби
  </div>
</div>

<!-- ══ МОДУЛИ ══ -->
<script type="module">
  import {
    initUniverse, stopUniverseAnimation,
    selectAgent, getUniverseState, resetUniverse
  } from './js/universe-module.js';

  import {
    UNIVERSE_LEVELS, getUniverseProgress,
    getUnlockedUniverseLevels, getUniverseLevelByLight,
    getGenerationLayers, createUniverseSnapshot
  } from './js/universe/universeProgression.js';

  import { loadState } from './js/state-module.js';
  import { formatBigNumber } from './js/ui-module.js';

  // === СОСТОЯНИЕ ===
  const canvas = document.getElementById('universe-canvas');
  let uniState = null;
  let currentAgent = null;

  // === ЗАПУСК ===
  async function start() {
    uniState = await initUniverse(canvas);

    if (uniState && uniState.agents) {
      document.getElementById('agent-count').textContent =
        uniState.agents.length + '/21';
    }

    renderProgression();
    listenForAgentSelection();

    console.log('[Universe Screen] Готов. Агентов:', uniState?.agents?.length || 0);
  }

  // === СЛУШАЕМ ВЫБОР АГЕНТА ===
  function listenForAgentSelection() {
    // Перехватываем клики по canvas чтобы показать панель
    canvas.addEventListener('click', async (e) => {
      // Даём universe-module обработать клик первым
      await new Promise(r => setTimeout(r, 100));

      const state = getUniverseState();
      if (state.selectedAgent !== null && state.selectedAgent !== undefined) {
        const agents = uniState?.agents;
        if (agents && agents[state.selectedAgent]) {
          currentAgent = agents[state.selectedAgent];
          showAgentPanel(currentAgent);
        }
      } else {
        hideAgentPanel();
      }
    });
  }

  // === ПОКАЗАТЬ ПАНЕЛЬ АГЕНТА ===
  function showAgentPanel(agent) {
    const panel = document.getElementById('agent-panel');
    document.getElementById('agent-panel-icon').textContent =
      agent.symbol || agent.icon || '✦';
    document.getElementById('agent-panel-name').textContent =
      agent.name || agent.id || 'Неизвестный агент';
    document.getElementById('agent-panel-domain').textContent =
      agent.domain || agent.element || '';

    const detailsEl = document.getElementById('agent-details');
    const details = [];

    if (agent.element) {
      details.push({ label: 'Стихия', value: agent.element });
    }
    if (agent.guna) {
      details.push({ label: 'Гуна', value: agent.guna });
    }
    if (agent.planet) {
      details.push({ label: 'Планета', value: agent.planet });
    }
    if (agent.vastu_zone) {
      details.push({ label: 'Зона Васту', value: agent.vastu_zone });
    }
    if (agent.ray) {
      details.push({ label: 'Луч', value: agent.ray });
    }
    if (agent.description) {
      details.push({ label: 'Описание', value: agent.description });
    }

    detailsEl.innerHTML = details.map(d =>
      '<div class="agent-detail">' +
      '<div class="agent-detail-label">' + d.label + '</div>' +
      '<div class="agent-detail-value">' + d.value + '</div>' +
      '</div>'
    ).join('');

    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Обновляем подзаголовок хедера
    document.getElementById('universe-subtitle').textContent =
      'агент: ' + (agent.name || agent.id);
  }

  // === СКРЫТЬ ПАНЕЛЬ АГЕНТА ===
  function hideAgentPanel() {
    const panel = document.getElementById('agent-panel');
    panel.classList.remove('visible');
    currentAgent = null;
    document.getElementById('universe-subtitle').textContent = 'космос игрока';
  }

  // === ОТРИСОВКА ПРОГРЕССИИ ===
  function renderProgression() {
    const state = loadState();
    const totalLight = state.totalLight || 0;
    const progress = getUniverseProgress(totalLight);
    const unlocked = getUnlockedUniverseLevels(totalLight);

    const container = document.getElementById('progression-levels');
    if (!container) return;

    let html = '';

    UNIVERSE_LEVELS.forEach((level, i) => {
      const isUnlocked = totalLight >= level.minLight;
      const isCurrent = progress.current && progress.current.id === level.id;
      const opacity = isUnlocked ? 1 : 0.35;
      const color = isCurrent ? level.color : (isUnlocked ? '#c9a84c' : 'rgba(201,168,76,0.3)');

      // Прогресс-бар между уровнями
      let progressBar = '';
      if (progress.next && progress.next.id === level.id) {
        progressBar =
          '<div class="level-progress-bar">' +
          '<div class="level-progress-fill" style="width:' + progress.progress + '%;"></div>' +
          '</div>';
      }

      html +=
        '<div style="opacity:' + opacity + ';">' +
        '<div class="level-row">' +
        '<div class="level-icon" style="color:' + color + ';">' + level.icon + '</div>' +
        '<div class="level-info">' +
        '<div class="level-name" style="color:' + color + ';">' +
        (isCurrent ? '● ' : '') + level.name +
        '</div>' +
        '<div class="level-subtitle">' + level.subtitle + '</div>' +
        '</div>' +
        '<div class="level-light">' +
        (isUnlocked ? formatBigNumber(level.minLight) + ' ✦' : '') +
        '</div>' +
        '</div>' +
        progressBar +
        '</div>';
    });

    // Статистика
    html +=
      '<div style="margin-top:14px;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;display:flex;justify-content:space-between;font-family:\'JetBrains Mono\',monospace;font-size:9px;">' +
      '<span style="color:rgba(201,168,76,0.5);">СВЕТ</span>' +
      '<span style="color:#ffd700;">' + formatBigNumber(totalLight) + ' ✦</span>' +
      '<span style="color:rgba(201,168,76,0.5);">УРОВЕНЬ</span>' +
      '<span style="color:#ffd700;">' + (progress.current ? progress.current.name : '—') + '</span>' +
      '</div>';

    if (progress.next) {
      html +=
        '<div style="text-align:center;margin-top:8px;font-size:10px;color:rgba(201,168,76,0.45);font-family:\'Cormorant Garamond\',serif;">' +
        'До ' + progress.next.name + ': ' + formatBigNumber(progress.lightToNext) + ' ✦' +
        '</div>';
    }

    container.innerHTML = html;
  }

  // === ОЧИСТКА ПРИ УХОДЕ ===
  window.addEventListener('beforeunload', () => {
    stopUniverseAnimation();
  });

  // === СТАРТ ===
  start();
</script>

</body>
</html>
