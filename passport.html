<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#02010a">
<title>Паспорт Души · AWARA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;
  --gold-bright:#ffd700;
  --gold-light:#fff8d6;
  --bg:#02010a;
  --line:rgba(201,168,76,0.18);
  --text:rgba(255,248,214,0.85);
  --text-soft:rgba(255,248,214,0.55);
  --text-mute:rgba(255,255,255,0.35);
}
html,body{background:var(--bg);color:var(--text);min-height:100vh}
body{
  font-family:'JetBrains Mono',monospace;
  padding:18px 14px 110px;
  background:
    radial-gradient(ellipse at 20% 18%, rgba(124,58,237,0.40), transparent 38%),
    radial-gradient(ellipse at 82% 72%, rgba(245,158,11,0.22), transparent 40%),
    radial-gradient(ellipse at 50% 110%, rgba(80,40,160,0.30), transparent 55%),
    linear-gradient(180deg,#070318 0%,#0d0626 45%,#05021a 100%),
    var(--bg);
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url('assets/starfield.svg');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0.95;
}
.wrap{max-width:580px;margin:0 auto;position:relative;z-index:1}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;gap:8px;
}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;min-height:44px;
  border:1px solid var(--line);border-radius:10px;
  font-family:Cinzel,serif;font-size:11px;
  letter-spacing:0.2em;color:var(--text-soft);
  text-decoration:none;cursor:pointer;transition:all 0.3s;
}
.back-link:hover{border-color:var(--gold);color:var(--gold)}

.passport-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(16px,4vw,22px);
  color:var(--gold);letter-spacing:0.15em;
  text-align:center;margin-bottom:6px;
}
.passport-sub{
  font-size:9px;letter-spacing:0.2em;
  color:var(--text-mute);text-align:center;margin-bottom:28px;
}

.passport-card{
  border:1px solid rgba(201,168,76,0.20);border-radius:14px;
  padding:clamp(16px,4vw,24px);margin-bottom:16px;
  background:rgba(14,8,32,0.28);
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px) saturate(130%);
  -webkit-backdrop-filter:blur(8px) saturate(130%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 6px 22px rgba(0,0,0,0.32);
}
.passport-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.06),transparent 60%);
  pointer-events:none;
}

.pp-section-title{
  font-family:Cinzel,serif;font-size:9px;
  letter-spacing:0.2em;color:rgba(201,168,76,0.45);
  margin-bottom:12px;
}

.pp-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 0;border-bottom:1px solid rgba(201,168,76,0.06);
}
.pp-label{font-size:9px;letter-spacing:0.1em;color:var(--text-mute)}
.pp-value{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(13px,3vw,15px);color:var(--text);
}
.pp-value-gold{color:var(--gold)}

.spirit-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:8px;margin-top:8px;
}
.spirit-cell{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 6px;border-radius:8px;
  background:rgba(201,168,76,0.04);border:1px solid rgba(201,168,76,0.08);
}
.spirit-name{font-size:8px;letter-spacing:0.12em;color:var(--text-mute)}
.spirit-val{
  font-family:'Cinzel',serif;font-size:clamp(14px,3.5vw,18px);
  color:var(--gold-light);
}

.streak-row{
  display:flex;gap:8px;align-items:center;justify-content:center;
  margin-top:8px;
}
.streak-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  transition:all 0.3s;
}
.streak-dot.active{
  background:var(--gold);
  box-shadow:0 0 8px rgba(201,168,76,0.5);
}
.streak-label{
  font-size:7px;color:var(--text-mute);text-align:center;margin-top:2px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="back-link" href="index.html">← ЛОББИ</a>
    <div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:0.15em;color:var(--text-mute);">AWARA</div>
  </div>

  <div class="passport-title">ПАСПОРТ ДУШИ</div>
  <div class="passport-sub">КАРТА ТВОЕГО ПУТИ</div>

  <!-- ИДЕНТИФИКАЦИЯ -->
  <div class="passport-card">
    <div class="pp-section-title">ИДЕНТИФИКАЦИЯ</div>
    <div class="pp-row">
      <span class="pp-label">PLAYER ID</span>
      <span class="pp-value" id="pp-id" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-mute);">—</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">АГЕНТ</span>
      <span class="pp-value pp-value-gold" id="pp-agent">—</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">МАТРИЦА</span>
      <span class="pp-value" id="pp-matrix">—</span>
    </div>
  </div>

  <!-- ЭНЕРГИЯ -->
  <div class="passport-card">
    <div class="pp-section-title">ЭНЕРГИЯ</div>
    <div class="pp-row">
      <span class="pp-label">СВЕТИМОСТЬ</span>
      <span class="pp-value pp-value-gold" id="pp-light">0 ✦</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">ДОМИНАНТНАЯ СТИХИЯ</span>
      <span class="pp-value" id="pp-element">—</span>
    </div>
    <div class="pp-row">
      <span class="pp-label">СЕРИЯ ДНЕЙ</span>
      <span class="pp-value pp-value-gold" id="pp-streak">0</span>
    </div>
  </div>

  <!-- ДУХ -->
  <div class="passport-card">
    <div class="pp-section-title">ДУХ</div>
    <div class="spirit-grid" id="pp-spirit"></div>
  </div>

  <!-- STREAK ВИЗУАЛИЗАЦИЯ -->
  <div class="passport-card">
    <div class="pp-section-title">СЕРИЯ ПОСЕЩЕНИЙ</div>
    <div class="streak-row" id="pp-streak-dots"></div>
  </div>

</div>

<script type="module">
import { getState } from './js/playerState.js';
import { getStreak } from './js/streak.js';

async function init() {
  const state = getState();

  // Player ID
  const pid = localStorage.getItem('awara_player_id') || '—';
  document.getElementById('pp-id').textContent = pid.length > 12 ? pid.slice(0, 8) + '…' : pid;

  // Agent
  const agentSlug = localStorage.getItem('awara_active_agent') || 'svet_ra';
  try {
    const agents = await fetch('data/agents.json').then(r => r.json());
    const agent = agents.find(a => a.slug === agentSlug || a.id === agentSlug);
    document.getElementById('pp-agent').textContent = agent ? agent.name : agentSlug;
  } catch { document.getElementById('pp-agent').textContent = agentSlug; }

  // Matrix
  document.getElementById('pp-matrix').textContent = state.activeSystem || 'Ведическая';

  // Light
  const light = state.totalLight || 0;
  document.getElementById('pp-light').textContent = light.toFixed(2) + ' ✦';

  // Dominant element
  const elems = state.elements || {};
  const sorted = Object.entries(elems).sort((a, b) => b[1] - a[1]);
  if (sorted.length > 0 && sorted[0][1] > 0) {
    document.getElementById('pp-element').textContent = sorted[0][0] + ' (' + sorted[0][1] + ')';
  } else {
    document.getElementById('pp-element').textContent = 'не определена';
  }

  // Spirit
  const spirit = state.spirit || {};
  const spiritEl = document.getElementById('pp-spirit');
  spiritEl.innerHTML = Object.entries(spirit).map(([k, v]) =>
    '<div class="spirit-cell">' +
      '<div class="spirit-name">' + k.toUpperCase() + '</div>' +
      '<div class="spirit-val">' + v + '</div>' +
    '</div>'
  ).join('');

  // Streak
  const streak = getStreak();
  document.getElementById('pp-streak').textContent = streak.current + '/7';

  const DAYS_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const dotsEl = document.getElementById('pp-streak-dots');
  dotsEl.innerHTML = streak.last7.map(d => {
    const dt = new Date(d.date);
    const label = DAYS_RU[dt.getDay() === 0 ? 6 : dt.getDay() - 1];
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:3px;">' +
      '<div class="streak-dot' + (d.visited ? ' active' : '') + '"></div>' +
      '<div class="streak-label">' + label + '</div></div>';
  }).join('');
}

init();
</script>
</body>
</html>
