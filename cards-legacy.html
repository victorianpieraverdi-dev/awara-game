<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#02010a">
  <title>Колода Карт · AWARA</title>

  <link rel="stylesheet" href="css/main.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold: #c9a84c;
      --gold-bright: #ffd700;
      --gold-light: #fff8d6;
      --bg: #02010a;
      --line: rgba(201,168,76,0.18);
      --text: rgba(255,248,214,0.85);
      --text-soft: rgba(255,248,214,0.55);
      --text-mute: rgba(255,255,255,0.35);
    }
    html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
    body {
      font-family: 'JetBrains Mono', monospace;
      padding: 18px 14px 60px;
      background:
        radial-gradient(ellipse at 20% 18%, rgba(124,58,237,0.42), transparent 38%),
        radial-gradient(ellipse at 82% 72%, rgba(245,158,11,0.22), transparent 40%),
        radial-gradient(ellipse at 50% 110%, rgba(80,40,160,0.30), transparent 55%),
        linear-gradient(180deg, #070318 0%, #0d0626 45%, #05021a 100%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: url('assets/starfield.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.95;
    }

    .wrap { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }

    /* Хедер */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 8px;
    }
    .back-link {
      color: var(--gold);
      text-decoration: none;
      font-family: Cinzel, serif;
      font-size: 13px;
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 12px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      transition: all 0.3s;
    }
    .back-link:hover { border-color: var(--gold-bright); background: rgba(201,168,76,0.08); }
    .counter {
      font-size: 10px;
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
    }
    .counter b { color: var(--gold-bright); }

    /* Фильтр */
    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.08em;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold-light); }
    .filter-btn.on {
      background: rgba(201,168,76,0.12);
      border-color: var(--gold);
      color: var(--gold-bright);
    }

    /* Сетка карт */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .card-tile {
      aspect-ratio: 2/3;
      background: rgba(14,8,32,0.28);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      backdrop-filter: blur(8px);
    }
    .card-tile:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .card-tile.locked { opacity: 0.35; cursor: default; }
    .card-tile.locked:hover { transform: none; border-color: var(--line); box-shadow: none; }
    .card-tile.collected { border-color: rgba(201,168,76,0.4); }
    .card-tile.collected::after {
      content: '\2726';
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 10px;
      color: var(--gold-bright);
    }
    .card-ico { font-size: clamp(22px, 6vw, 32px); margin-bottom: 6px; }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(9px, 2.2vw, 11px);
      color: var(--text);
      line-height: 1.3;
    }
    .card-matrix {
      font-size: 7px;
      color: var(--text-mute);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* Попап */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .popup-overlay.show { display: flex; }
    .popup-card {
      background: linear-gradient(135deg, rgba(18,14,30,0.95), rgba(8,5,18,0.95));
      border: 1px solid var(--gold);
      border-radius: 18px;
      padding: 28px 20px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      position: relative;
      box-shadow: 0 0 40px rgba(201,168,76,0.15);
    }
    .popup-card .pp-ico { font-size: 48px; margin-bottom: 12px; }
    .popup-card .pp-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 18px;
      color: var(--gold-bright);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }
    .popup-card .pp-meta {
      font-size: 10px;
      color: var(--text-soft);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.8;
    }
    .popup-card .pp-status {
      margin-top: 14px;
      font-family: Cinzel, serif;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    .popup-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      color: var(--gold);
      font-size: 20px;
      cursor: pointer;
      min-width: 36px;
      min-height: 36px;
    }

    /* Разблокировка */
    .unlock-btn {
      display: block;
      margin: 20px auto 0;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid rgba(255,100,100,0.4);
      border-radius: 8px;
      color: rgba(255,100,100,0.7);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }

    @media (max-width: 375px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .card-tile { padding: 8px 6px; }
      .filter-btn { font-size: 8px; padding: 5px 10px; }
    }
    @media (min-width: 600px) {
      .cards-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <a href="index.html" class="back-link">&#9664; ЛОББИ</a>
    <div class="counter" id="counter">Собрано: <b>0</b> / 63</div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn on" data-filter="all">ВСЕ</button>
    <button class="filter-btn" data-filter="vedic">ВЕДИЧЕСКИЕ</button>
    <button class="filter-btn" data-filter="slavic">СЛАВЯНСКИЕ</button>
    <button class="filter-btn" data-filter="kabbalistic">КАББАЛА</button>
    <button class="filter-btn" data-filter="collected">СОБРАНЫ</button>
  </div>

  <div class="cards-grid" id="cards-grid"></div>

  <button class="unlock-btn" id="unlock-btn" style="display:none;" onclick="window._cards.unlockAll()">
    РАЗБЛОКИРОВАТЬ ВСЕ (debug)
  </button>
</div>

<!-- Попап карты -->
<div class="popup-overlay" id="card-popup">
  <div class="popup-card">
    <button class="popup-close" onclick="document.getElementById('card-popup').classList.remove('show')">&#215;</button>
    <div class="pp-ico" id="pop-ico">&#10022;</div>
    <div class="pp-name" id="pop-name">&#8212;</div>
    <div class="pp-meta">
      <div>матрица: <span id="pop-matrix">&#8212;</span></div>
      <div>стихия: <span id="pop-el">&#8212;</span></div>
      <div>зона: <span id="pop-zone">&#8212;</span></div>
      <div>тир: <span id="pop-rarity">&#8212;</span></div>
      <div style="margin-top:6px;font-style:italic;" id="pop-effect">&#8212;</div>
    </div>
    <div class="pp-status" id="pop-status">&#8212;</div>
  </div>
</div>

<script type="module">
  import { loadAgents, loadMatrices, loadLocas } from './js/canon-module.js';
  import { loadState, saveState } from './js/state-module.js';

  const LOCAL_KEY = 'awara_cards_collected';
  const MATRICES = ['vedic', 'slavic', 'kabbalistic'];

  let agents = [];
  let collected = {};
  let activeFilter = 'all';

  function cardId(agentSlug, matrixSlug) {
    return agentSlug + '_' + matrixSlug;
  }

  function loadCollected() {
    try {
      collected = JSON.parse(localStorage.getItem(LOCAL_KEY) || '{}');
    } catch (e) { collected = {}; }
  }

  function saveCollected() {
    localStorage.setItem(LOCAL_KEY, JSON.stringify(collected));
  }

  function renderCards(filter) {
    const grid = document.getElementById('cards-grid');
    if (!grid) return;

    let cards = [];
    agents.forEach(a => {
      MATRICES.forEach(mSlug => {
        const cid = cardId(a.slug || a.id, mSlug);
        const isOwned = !!collected[cid];
        if (filter === 'collected' && !isOwned) return;
        if (filter !== 'all' && filter !== 'collected' && mSlug !== filter) return;

        cards.push({
          id: cid,
          agentName: a.name || a.slug,
          agentSlug: a.slug || a.id,
          matrix: mSlug,
          element: a.element || '\u042D\u0444\u0438\u0440',
          zone: a.vastu_zone || '\u0414\u041E\u041C\u0415\u041D',
          guna: a.guna || '',
          owned: isOwned
        });
      });
    });

    grid.innerHTML = cards.map(c =>
      '<div class="card-tile' + (c.owned ? ' collected' : ' locked') + '" data-id="' + c.id + '">' +
      '<div class="card-ico">' + (c.owned ? '\u2726' : '\uD83D\uDD12') + '</div>' +
      '<div class="card-name">' + (c.owned ? c.agentName : '???') + '</div>' +
      '<div class="card-matrix">' + c.matrix.toUpperCase() + '</div>' +
      '</div>'
    ).join('');

    grid.querySelectorAll('.card-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        const cid = tile.dataset.id;
        const card = cards.find(c => c.id === cid);
        if (card) showCardPopup(card);
      });
    });

    updateCounter();
  }

  function showCardPopup(card) {
    document.getElementById('pop-ico').textContent = card.owned ? '\u2726' : '\uD83D\uDD12';
    document.getElementById('pop-name').textContent = card.owned ? card.agentName : '???';
    document.getElementById('pop-matrix').textContent = card.matrix.toUpperCase();
    document.getElementById('pop-el').textContent = card.element;
    document.getElementById('pop-zone').textContent = card.zone;
    document.getElementById('pop-rarity').textContent = card.guna;
    document.getElementById('pop-effect').textContent = card.owned ? '\u0412 \u041A\u041E\u041B\u041B\u0415\u041A\u0426\u0418\u0418' : '\u041D\u0415 \u041D\u0410\u0419\u0414\u0415\u041D\u0410';
    document.getElementById('pop-status').textContent = card.owned ? '\u2726 \u0412 \u041A\u041E\u041B\u041B\u0415\u041A\u0426\u0418\u0418' : '\u041D\u0415 \u041D\u0410\u0419\u0414\u0415\u041D\u0410';
    document.getElementById('pop-status').style.color = card.owned ? '#c9a84c' : 'rgba(255,255,255,0.3)';
    document.getElementById('card-popup').classList.add('show');
  }

  function updateCounter() {
    const total = agents.length * MATRICES.length;
    const count = Object.keys(collected).length;
    document.getElementById('counter').innerHTML = '\u0421\u043E\u0431\u0440\u0430\u043D\u043E: <b>' + count + '</b> / ' + total;
  }

  function unlockAll() {
    agents.forEach(a => {
      MATRICES.forEach(mSlug => {
        collected[cardId(a.slug || a.id, mSlug)] = true;
      });
    });
    saveCollected();
    renderCards(activeFilter);
  }

  // Фильтры
  document.getElementById('filter-bar').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    e.target.classList.add('on');
    activeFilter = e.target.dataset.filter;
    renderCards(activeFilter);
  });

  // Закрытие попапа
  document.getElementById('card-popup').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.remove('show');
    }
  });

  // Инициализация
  async function init() {
    loadCollected();
    agents = await loadAgents() || [];
    console.log('[Cards] Загружено агентов:', agents.length);
    renderCards('all');

    const hasUnlocked = Object.keys(collected).length > 0;
    document.getElementById('unlock-btn').style.display = hasUnlocked ? 'none' : 'block';
  }

  window._cards = { unlockAll };

  init();
</script>

</body>
</html>
