<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Колода Карт — AWARA</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(10, 6, 30, 0.9), transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(201, 120, 40, 0.15), transparent 45%),
        radial-gradient(ellipse at 20% 80%, rgba(245, 158, 11, 0.14), transparent 45%),
        linear-gradient(180deg, #020810 0%, #050119 45%, #030618 100%),
        #000;
      color: #dcd2be;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Звёзды */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,215,0,0.6), transparent),
        radial-gradient(1px 1px at 30% 50%, rgba(255,215,0,0.4), transparent),
        radial-gradient(1.5px 1.5px at 50% 15%, rgba(255,248,214,0.5), transparent),
        radial-gradient(1px 1px at 70% 40%, rgba(201,168,76,0.5), transparent),
        radial-gradient(1px 1px at 90% 70%, rgba(255,215,0,0.3), transparent),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,248,214,0.4), transparent),
        radial-gradient(1px 1px at 45% 75%, rgba(201,168,76,0.4), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255,215,0,0.5), transparent),
        radial-gradient(1px 1px at 60% 90%, rgba(255,248,214,0.3), transparent),
        radial-gradient(1.5px 1.5px at 25% 35%, rgba(201,168,76,0.6), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .cards-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      position: relative;
      z-index: 1;
    }

    /* Хедер */
    .cards-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 16px 20px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      background: rgba(10,6,30,0.6);
    }

    .cards-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c9a84c;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      transition: color 0.3s;
    }
    .cards-back:hover { color: #ffd700; }

    .cards-back-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      font-size: 16px;
    }

    .cards-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 4vw, 22px);
      color: #c9a84c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cards-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,248,214,0.6);
    }
    .cards-counter b { color: #ffd700; }

    /* Подзаголовок */
    .cards-subtitle {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(255,248,214,0.5);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    /* Фильтр */
    .filter-section {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }

    .filter-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      color: rgba(255,248,214,0.5);
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .filter-btn:hover {
      border-color: #c9a84c;
      color: #ffd700;
    }
    .filter-btn.active {
      background: rgba(201,168,76,0.15);
      border-color: #c9a84c;
      color: #ffd700;
    }

    /* Сетка карт */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 480px) {
      .cards-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 768px) {
      .cards-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* Карта */
    .card {
      aspect-ratio: 2 / 3;
      background: rgba(10,6,30,0.5);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      backdrop-filter: blur(4px);
    }
    .card:hover {
      border-color: #ffd700;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.15);
      background: rgba(201,168,76,0.05);
    }

    .card-symbol {
      font-size: clamp(24px, 6vw, 36px);
      margin-bottom: 8px;
      color: #ffd700;
    }

    .card-agent {
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 2.2vw, 12px);
      color: #c9a84c;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .card-matrix {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(7px, 1.6vw, 9px);
      color: rgba(255,248,214,0.4);
      letter-spacing: 0.06em;
    }

    .card-cultural {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(7px, 1.6vw, 9px);
      color: rgba(201,168,76,0.5);
      margin-top: 4px;
      line-height: 1.2;
    }

    /* Пустое состояние */
    .cards-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,248,214,0.4);
      font-style: italic;
    }

    /* Модалка: дополнительные стили для контента */
    .modal-card-content {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
    }
    .modal-card-content .modal-symbol {
      font-size: 48px;
      color: #ffd700;
      margin-bottom: 12px;
    }
    .modal-card-content .modal-agent-name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: #ffd700;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }
    .modal-card-content .modal-cultural-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: rgba(201,168,76,0.7);
      margin-bottom: 16px;
    }
    .modal-card-content .modal-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,248,214,0.6);
      line-height: 2;
      text-align: left;
    }
    .modal-card-content .modal-meta span {
      color: #c9a84c;
    }

    /* Канон-лейбл */
    .canon-label {
      text-align: center;
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,248,214,0.25);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="cards-container">
  <!-- Хедер -->
  <div class="cards-header">
    <a href="index.html" class="cards-back">
      <span class="cards-back-arrow">&#9664;</span>
      <span class="cards-title">Колода Карт</span>
    </a>
    <div class="cards-counter" id="cards-counter">Открыто: <b>0</b> / 63</div>
  </div>

  <div class="cards-subtitle">63 карты Благоденствия (21 агент x 3 матрицы)</div>

  <!-- Фильтр -->
  <div class="filter-section" id="filter-section">
    <button class="filter-btn active" data-filter="all">Все</button>
  </div>

  <!-- Сетка карт -->
  <div class="cards-grid" id="cards-grid"></div>

  <!-- Канон -->
  <div class="canon-label" id="canon-label"></div>
</div>

<!-- Модуль -->
<script type="module">
  import { loadAgents, loadMatrices, loadAgentMatrixMap } from './js/canon-module.js';
  import { showModal } from './js/ui-module.js';
  import { loadState, updateState } from './js/state-module.js';

  let allCards = [];
  let agents = [];
  let matrixSubset = [];
  let agentMatrixMap = [];
  let activeFilter = 'all';

  // --- Загрузка данных ---
  async function init() {
    try {
      agents = await loadAgents() || [];
      const matrices = await loadMatrices() || [];
      agentMatrixMap = await loadAgentMatrixMap() || [];

      console.log('[Canon] Загружено агентов:', agents.length);
      console.log('[Canon] Загружено матриц:', matrices.length);
      console.log('[Canon] Загружено связей agent_matrix_map:', agentMatrixMap.length);

      // Берём первые 3 матрицы для колоды
      matrixSubset = matrices.slice(0, 3);
      console.log('[Canon] Матрицы для колоды:', matrixSubset.map(m => m.name).join(', '));

      // Генерируем 63 карты
      allCards = [];
      for (const agent of agents) {
        for (const matrix of matrixSubset) {
          // Ищем cultural_name в agent_matrix_map
          const mapEntry = agentMatrixMap.find(
            e => e.agent_id === agent.id && e.matrix_id === matrix.id
          );

          allCards.push({
            id: agent.id + '_' + matrix.id,
            agent: agent,
            matrix: matrix,
            culturalName: mapEntry ? mapEntry.cultural_name : null
          });
        }
      }

      console.assert(allCards.length === 63, '[Canon] Карт должно быть 63, а не ' + allCards.length);
      console.log('[Canon] Карт сгенерировано: ' + allCards.length);

      // Создаём кнопки фильтра
      buildFilterButtons();

      // Рендерим карты
      renderCards();

      // Обновляем канон-лейбл
      document.getElementById('canon-label').textContent =
        'Канон: ' + agents.length + ' агентов / ' + matrices.length + ' матриц / ' + allCards.length + ' карт';

      console.log('[Cards] Экран Колоды Карт загружен');
    } catch (err) {
      console.error('[Cards] Ошибка инициализации:', err);
    }
  }

  // --- Фильтр кнопки ---
  function buildFilterButtons() {
    const section = document.getElementById('filter-section');
    // Кнопка "Все" уже есть в HTML, добавляем матрицы
    for (const m of matrixSubset) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = String(m.id);
      btn.textContent = m.name;
      section.appendChild(btn);
    }
  }

  // --- Обработка кликов фильтра ---
  document.getElementById('filter-section').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });

  // --- Рендер карт ---
  function renderCards() {
    const grid = document.getElementById('cards-grid');
    let filtered = allCards;

    if (activeFilter !== 'all') {
      const matrixId = parseInt(activeFilter, 10);
      filtered = allCards.filter(c => c.matrix.id === matrixId);
    }

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="cards-empty">Нет карт для выбранного фильтра</div>';
      return;
    }

    grid.innerHTML = filtered.map(card => {
      const symbol = getAgentSymbol(card.agent);
      const agentName = escapeHtml(card.agent.name);
      const matrixName = escapeHtml(card.matrix.name);
      const cultural = card.culturalName ? escapeHtml(card.culturalName) : '';

      return '<div class="card" data-card-id="' + card.id + '">' +
        '<div class="card-symbol">' + symbol + '</div>' +
        '<div class="card-agent">' + agentName + '</div>' +
        '<div class="card-matrix">' + matrixName + '</div>' +
        (cultural ? '<div class="card-cultural">' + cultural + '</div>' : '') +
        '</div>';
    }).join('');

    // Привязка кликов
    grid.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => {
        const cardId = el.dataset.cardId;
        const card = allCards.find(c => c.id === cardId);
        if (card) showCardModal(card);
      });
    });

    // Обновляем счётчик
    document.getElementById('cards-counter').innerHTML =
      'Открыто: <b>' + filtered.length + '</b> / ' + allCards.length;
  }

  // --- Модалка карты ---
  function showCardModal(card) {
    const symbol = getAgentSymbol(card.agent);
    const cultural = card.culturalName || '---';

    const content = '<div class="modal-card-content">' +
      '<div class="modal-symbol">' + symbol + '</div>' +
      '<div class="modal-agent-name">' + escapeHtml(card.agent.name) + '</div>' +
      '<div class="modal-cultural-name">' + escapeHtml(cultural) + '</div>' +
      '<div class="modal-meta">' +
        '<div>матрица: <span>' + escapeHtml(card.matrix.name) + '</span></div>' +
        '<div>стихия: <span>' + escapeHtml(card.agent.element || '---') + '</span></div>' +
        '<div>гуна: <span>' + escapeHtml(card.agent.guna || '---') + '</span></div>' +
        '<div>домен: <span>' + escapeHtml(card.agent.domain || '---') + '</span></div>' +
        '<div>зона: <span>' + escapeHtml(card.agent.vastu_zone || '---') + '</span></div>' +
        '<div>планета: <span>' + escapeHtml(card.agent.planet || '---') + '</span></div>' +
        '<div>луч: <span>' + (card.agent.ray || '---') + '</span></div>' +
      '</div>' +
    '</div>';

    showModal({
      title: card.agent.name + ' / ' + card.matrix.name,
      content: content
    });
  }

  // --- Символ агента ---
  function getAgentSymbol(agent) {
    const symbols = {
      'Огонь': '&#9832;',
      'Вода': '&#9783;',
      'Земля': '&#9795;',
      'Воздух': '&#9788;',
      'Эфир': '&#10022;'
    };
    return symbols[agent.element] || '&#10022;';
  }

  // --- Экранирование HTML ---
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  init();
</script>

</body>
</html>
