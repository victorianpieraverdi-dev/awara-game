<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#02010a">
<title>Колода Карт · AWARA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;
  --gold-bright:#ffd700;
  --gold-light:#fff8d6;
  --bg:#02010a;
  --line:rgba(201,168,76,0.18);
  --text:rgba(255,248,214,0.85);
  --text-soft:rgba(255,248,214,0.55);
  --text-mute:rgba(255,255,255,0.35);
}
html,body{background:var(--bg);color:var(--text);min-height:100vh}
body{
  font-family:'JetBrains Mono',monospace;
  padding:18px 14px 40px;
  background:
    radial-gradient(ellipse at 18% 28%, rgba(116,42,180,0.22), transparent 40%),
    radial-gradient(ellipse at 82% 72%, rgba(216,115,42,0.14), transparent 42%),
    radial-gradient(ellipse at 50% -10%, rgba(201,168,76,0.10), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(80,40,140,0.08), transparent 60%),
    var(--bg);
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 7% 11%,rgba(255,255,255,0.95) 0 1.3px,transparent 2px),
    radial-gradient(circle at 19% 34%,rgba(255,215,120,0.72) 0 1px,transparent 1.8px),
    radial-gradient(circle at 34% 16%,rgba(180,210,255,0.78) 0 1.1px,transparent 1.9px),
    radial-gradient(circle at 47% 42%,rgba(255,255,255,0.58) 0 0.8px,transparent 1.5px),
    radial-gradient(circle at 63% 22%,rgba(255,255,255,0.86) 0 1.5px,transparent 2.4px),
    radial-gradient(circle at 82% 13%,rgba(255,215,120,0.70) 0 1.2px,transparent 2px),
    radial-gradient(circle at 91% 39%,rgba(180,210,255,0.66) 0 0.9px,transparent 1.7px),
    radial-gradient(circle at 12% 67%,rgba(255,255,255,0.72) 0 1px,transparent 1.8px),
    radial-gradient(circle at 28% 84%,rgba(255,215,120,0.52) 0 1.5px,transparent 2.5px),
    radial-gradient(circle at 54% 76%,rgba(255,255,255,0.92) 0 1px,transparent 1.8px),
    radial-gradient(circle at 73% 61%,rgba(180,210,255,0.76) 0 1.4px,transparent 2.3px),
    radial-gradient(circle at 88% 82%,rgba(255,255,255,0.62) 0 0.8px,transparent 1.5px);
  opacity:0.95;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 22% 18%,rgba(255,255,255,0.18),transparent 7px),
    radial-gradient(circle at 76% 34%,rgba(255,215,120,0.14),transparent 9px),
    radial-gradient(circle at 58% 72%,rgba(180,210,255,0.13),transparent 8px),
    radial-gradient(circle at 9% 88%,rgba(255,255,255,0.10),transparent 10px);
}
.wrap{max-width:780px;margin:0 auto;position:relative;z-index:1}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;gap:8px;
}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;min-height:44px;
  border:1px solid var(--line);border-radius:10px;
  font-family:Cinzel,serif;font-size:11px;
  letter-spacing:0.2em;color:var(--text-soft);
  text-decoration:none;cursor:pointer;transition:all 0.3s;
}
.back-link:hover{border-color:var(--gold);color:var(--gold)}

.page-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(16px,4vw,22px);
  color:var(--gold);letter-spacing:0.15em;
  text-align:center;margin-bottom:4px;
}
.page-sub{
  font-size:9px;letter-spacing:0.2em;
  color:var(--text-mute);text-align:center;margin-bottom:6px;
}
.counter{
  text-align:center;font-size:11px;color:var(--text-mute);
  margin-bottom:20px;
}
.counter b{color:var(--gold)}

/* Фильтры матриц */
.filter-row{
  display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;
}
.filter-panel{
  display:grid;gap:10px;margin:14px auto 18px;max-width:680px;
  padding:12px;border:1px solid rgba(201,168,76,0.16);border-radius:12px;
  background:rgba(8,4,24,0.14);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.filter-control{
  width:100%;min-height:42px;padding:9px 12px;border-radius:9px;
  border:1px solid rgba(201,168,76,0.22);background:rgba(2,1,10,0.65);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
}
.filter-control:focus{border-color:rgba(201,168,76,0.5)}
.filter-line{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){.filter-line{grid-template-columns:1fr}}
.filter-btn{
  padding:6px 14px;min-height:44px;border-radius:20px;cursor:pointer;
  font-family:Cinzel,serif;font-size:10px;letter-spacing:0.12em;
  color:var(--text-mute);border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);transition:all 0.2s;
  display:flex;align-items:center;
}
.filter-btn.on{color:var(--gold);border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.07);}

/* Сетка карт */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
}

.card{
  border:1px solid rgba(201,168,76,0.18);border-radius:12px;
  padding:14px 10px;text-align:center;
  background:rgba(8,4,24,0.14);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  transition:all 0.3s;cursor:pointer;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.04),transparent 70%);
  pointer-events:none;
}
.card.owned{
  border-color:rgba(201,168,76,0.35);
  background:rgba(201,168,76,0.06);
}
.card.locked{opacity:0.4;filter:grayscale(0.6);}
.card:hover{border-color:rgba(201,168,76,0.5);transform:translateY(-2px);}
.card.rarity-common{border-color:rgba(160,160,160,0.35);}
.card.rarity-uncommon{border-color:rgba(80,190,160,0.42);}
.card.rarity-rare{border-color:rgba(255,215,0,0.52);}
.card.rarity-epic{border-color:rgba(170,90,255,0.58);}
.card.rarity-legendary{border-color:rgba(255,248,214,0.82);box-shadow:0 0 18px rgba(255,248,214,0.18),inset 0 0 12px rgba(255,215,0,0.08);animation:legendaryGlow 2.8s ease-in-out infinite;}
@keyframes legendaryGlow{0%,100%{box-shadow:0 0 16px rgba(255,248,214,0.14),inset 0 0 10px rgba(255,215,0,0.06)}50%{box-shadow:0 0 26px rgba(255,248,214,0.34),inset 0 0 18px rgba(255,215,0,0.14)}}

.card-el{font-size:clamp(24px,6vw,32px);margin-bottom:6px;}
.card-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(12px,3vw,14px);color:var(--text);
  line-height:1.3;margin-bottom:4px;
}
.card-matrix{
  font-size:8px;letter-spacing:0.12em;color:rgba(201,168,76,0.45);
  margin-bottom:6px;
}
.card-element{
  font-size:8px;letter-spacing:0.1em;color:var(--text-mute);
}
.card-badge{
  position:absolute;top:6px;right:6px;
  font-size:8px;padding:2px 6px;border-radius:10px;
  background:rgba(201,168,76,0.15);color:var(--gold);
  font-family:'JetBrains Mono',monospace;
}
.rarity-badge{
  position:absolute;top:6px;left:6px;
  font-size:7px;padding:2px 6px;border-radius:10px;
  font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;
  background:rgba(0,0,0,0.45);border:1px solid currentColor;
}
.rarity-badge.common{color:rgba(180,180,180,0.9)}
.rarity-badge.uncommon{color:rgba(92,220,170,0.95)}
.rarity-badge.rare{color:rgba(255,215,0,0.95)}
.rarity-badge.epic{color:rgba(190,120,255,0.95)}
.rarity-badge.legendary{color:var(--gold-light);text-shadow:0 0 8px rgba(255,248,214,0.55)}
.card-locked-ico{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:20px;opacity:0.3;
}

/* Попап карты */
#card-popup{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(2,1,8,0.9);display:none;
  align-items:center;justify-content:center;padding:20px;
}
#card-popup.show{display:flex;}
.popup-card{
  width:min(340px,90vw);padding:28px 24px;border-radius:16px;
  background:rgba(6,4,18,0.98);border:1px solid rgba(201,168,76,0.3);
  text-align:center;position:relative;
}
.popup-ico{font-size:48px;margin-bottom:12px;}
.popup-name{
  font-family:'Cinzel',serif;font-size:20px;color:var(--gold);
  letter-spacing:0.1em;margin-bottom:6px;
}
.popup-matrix{font-size:10px;letter-spacing:0.15em;color:var(--text-mute);margin-bottom:14px;}
.popup-row{
  display:flex;justify-content:space-between;padding:5px 0;
  border-bottom:1px solid rgba(201,168,76,0.06);
  font-size:12px;
}
.popup-lbl{color:var(--text-mute);font-size:9px;letter-spacing:0.1em;}
.popup-val{color:var(--text);font-family:'Cormorant Garamond',serif;font-size:14px;}
.popup-close{
  margin-top:16px;padding:10px 28px;min-height:44px;
  border:1px solid rgba(201,168,76,0.3);border-radius:8px;
  background:rgba(201,168,76,0.06);color:var(--gold);
  font-family:Cinzel,serif;font-size:10px;letter-spacing:0.15em;cursor:pointer;
}
@media(max-width:560px){
  body{
    padding:10px 8px 34px;
    background:
      radial-gradient(ellipse at 18% 28%, rgba(116,42,180,0.30), transparent 40%),
      radial-gradient(ellipse at 82% 72%, rgba(216,115,42,0.20), transparent 42%),
      radial-gradient(ellipse at 50% -10%, rgba(201,168,76,0.14), transparent 55%),
      var(--bg);
  }
  .wrap{
    width:min(430px,100%);
    max-width:none;
    padding:14px;
    border:1px solid rgba(201,168,76,0.26);
    border-radius:30px;
    background:linear-gradient(180deg,rgba(8,4,24,0.58),rgba(3,2,12,0.68));
    box-shadow:0 0 0 1px rgba(255,215,80,0.08),0 30px 120px rgba(0,0,0,0.65),inset 0 0 48px rgba(201,168,76,0.04);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
  }
  .topbar{margin-bottom:18px}
  .back-link{padding:11px 14px;border-radius:12px;font-size:12px;background:rgba(2,1,10,0.45)}
  .page-title{font-size:22px;letter-spacing:0.12em}
  .page-sub{font-size:10px;letter-spacing:0.12em;line-height:1.5}
  .counter{font-size:12px}
  .filter-panel{
    max-width:100%;
    padding:14px;
    border-radius:18px;
    background:linear-gradient(135deg,rgba(18,14,30,0.72),rgba(8,5,18,0.62));
  }
  .filter-control{min-height:48px;padding:12px;font-size:12px;border-radius:12px}
  .filter-line{grid-template-columns:1fr}
  .filter-btn{min-height:42px;border-radius:14px;padding:8px 12px}
  .cards-grid{grid-template-columns:1fr;gap:12px}
  .card{min-height:156px;padding:18px 14px;border-radius:18px;background:linear-gradient(135deg,rgba(18,14,30,0.72),rgba(8,5,18,0.62))}
  .card-el{font-size:38px}
  .card-name{font-size:19px}
  .card-matrix,.card-element{font-size:10px}
  .popup-card{width:min(390px,94vw);border-radius:22px;background:linear-gradient(180deg,rgba(8,4,24,0.98),rgba(3,2,12,0.98))}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="back-link" href="index.html">← ЛОББИ</a>
    <div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:0.15em;color:var(--text-mute);">AWARA</div>
  </div>

  <div class="page-title">КОЛОДА КАРТ</div>
  <div style="text-align:center;margin:-6px 0 8px;font-size:9px;letter-spacing:0.14em;color:rgba(255,248,214,0.35);">BUILD: CARDS-1500-UNLOCK-v2</div>
  <div class="page-sub">ОСНОВНЫЕ КАРТЫ + ПУТЬ МОНАДЫ + ДОМЕНЫ АГЕНТОВ + ВЕДИЧЕСКИЕ ЛОКИ И ИХ СИЛЫ + МИФОЛОГИЧЕСКИЕ СУЩЕСТВА, ЛОКАЦИИ И РЕЛИКВИИ</div>
  <div class="counter" id="counter">Собрано: <b>0</b> / загрузка...</div>
  <div style="display:flex;justify-content:center;margin:12px 0 6px;">
    <button onclick="unlockDemoDeck()" style="min-height:44px;padding:10px 18px;border:1px solid rgba(201,168,76,0.35);border-radius:10px;background:rgba(201,168,76,0.07);color:var(--gold);font-family:Cinzel,serif;font-size:10px;letter-spacing:0.16em;cursor:pointer;">
      ОТКРЫТЬ ДЕМО-КОЛОДУ
    </button>
  </div>

  <div class="filter-panel">
    <input id="card-search" class="filter-control" type="search" placeholder="Поиск по имени, матрице, стихии..." oninput="setCardSearch(this.value)">
    <div class="filter-line">
      <select id="matrix-filter" class="filter-control" onchange="setFilter(this.value)"></select>
      <select id="type-filter" class="filter-control" onchange="setTypeFilter(this.value)"></select>
    </div>
    <div class="filter-row" id="rarity-filters"></div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- Попап -->
<div id="card-popup" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="popup-card">
    <div class="popup-ico" id="pop-ico"></div>
    <div class="popup-name" id="pop-name"></div>
    <div class="popup-matrix" id="pop-matrix"></div>
    <div class="popup-row"><span class="popup-lbl">СТИХИЯ</span><span class="popup-val" id="pop-el"></span></div>
    <div class="popup-row"><span class="popup-lbl">ВАСТУ-ЗОНА</span><span class="popup-val" id="pop-zone"></span></div>
    <div class="popup-row"><span class="popup-lbl">РАРНОСТЬ</span><span class="popup-val" id="pop-rarity"></span></div>
    <div class="popup-row"><span class="popup-lbl">ЭФФЕКТ</span><span class="popup-val" id="pop-effect"></span></div>
    <div class="popup-row"><span class="popup-lbl">СТАТУС</span><span class="popup-val" id="pop-status"></span></div>
    <button class="popup-close" onclick="document.getElementById('card-popup').classList.remove('show')">ЗАКРЫТЬ</button>
  </div>
</div>

<script>
var MATRICES = [];
var MATRIX_EFFECTS = {
  'Ведическая':   '+1 ✦ свет/час',
  'Славянская':    '+5% шанс ключа',
  'Каббалистическая': '+1 🔑 при streak 7'
};
var EL_ICO = {
  'Огонь':'🔥','Вода':'🌊','Земля':'🌱','Воздух':'💨','Эфир':'✦'
};
var RARITY_LABELS = {
  common:'ЗЕМНАЯ', uncommon:'КУЛЬТУРНАЯ', rare:'АГЕНТСКАЯ', epic:'АРТЕФАКТНАЯ', legendary:'БОЖЕСТВЕННАЯ'
};
var TYPE_LABELS = {
  core:'ЯДРО',
  monad_path:'МОНАДА',
  agent_domain:'ДОМЕНЫ',
  vedic_loka:'ЛОКИ',
  vedic_loka_being:'СИЛЫ ЛОК',
  extra_being:'СУЩЕСТВА',
  mythic_location:'ЛОКАЦИИ',
  mythic_relic:'РЕЛИКВИИ'
};

var agents = [];
var matrices = [];
var cardPrompts = {};
var extraCards = [];
var domainCards = [];
var lokaCards = [];
var lokaBeingCards = [];
var monadCards = [];
var collected = {};

function loadCollected(){
  try { collected = JSON.parse(localStorage.getItem('awara_cards')||'{}'); } catch(e){ collected={}; }
}
function saveCollected(){
  try { localStorage.setItem('awara_cards', JSON.stringify(collected)); } catch(e){}
}

function cardId(agentSlug, matrixSlug){ return agentSlug + '__' + matrixSlug; }

async function fetchJson(path){
  var urls = [
    path,
    './' + path,
    path + '?v=cards-full-2271',
    'https://victorianpieraverdi-dev.github.io/awara-game/' + path + '?v=cards-full-2271'
  ];
  var lastError = null;
  for(var i=0;i<urls.length;i++){
    try {
      var res = await fetch(urls[i]);
      if(!res.ok) throw new Error(urls[i] + ' HTTP ' + res.status);
      return res.json();
    } catch(e) {
      lastError = e;
    }
  }
  throw lastError || new Error(path + ' fetch failed');
}

function asArray(data){
  return Array.isArray(data) ? data : Object.keys(data || {}).map(function(k){ return data[k]; });
}

function showLoadError(message){
  var grid = document.getElementById('cards-grid');
  if(grid){
    grid.innerHTML = '<div style="grid-column:1/-1;padding:18px;border:1px solid rgba(255,80,80,0.35);border-radius:12px;color:rgba(255,180,180,0.9);font-size:12px;line-height:1.6;text-align:center;">Не удалось загрузить колоду.<br>'+message+'</div>';
  }
  var counter = document.getElementById('counter');
  if(counter) counter.innerHTML = 'Собрано: <b>0</b> / ошибка загрузки';
}

async function init(){
  loadCollected();

  try {
    agents = asArray(await fetchJson('data/agents.json'));
  } catch(e){ console.warn('cards: agents.json error', e); showLoadError(e.message); return; }
  try {
    matrices = asArray(await fetchJson('data/matrices.json'));
    MATRICES = matrices.map(function(m){ return m.name; });
  } catch(e){ console.warn('cards: matrices.json error', e); matrices = []; MATRICES = []; }
  try {
    var prompts = asArray(await fetchJson('data/card_prompts.json'));
    prompts.forEach(function(p){ cardPrompts[p.card_id] = p; });
  } catch(e){ console.warn('cards: card_prompts.json error', e); }
  try {
    extraCards = asArray(await fetchJson('data/extra_card_prompts.json'));
  } catch(e){ console.warn('cards: extra_card_prompts.json error', e); extraCards = []; }
  try {
    domainCards = asArray(await fetchJson('data/domain_cards.json'));
  } catch(e){ console.warn('cards: domain_cards.json error', e); domainCards = []; }
  try {
    lokaCards = asArray(await fetchJson('data/vedic_loka_cards.json'));
  } catch(e){ console.warn('cards: vedic_loka_cards.json error', e); lokaCards = []; }
  try {
    lokaBeingCards = asArray(await fetchJson('data/vedic_loka_being_cards.json'));
  } catch(e){ console.warn('cards: vedic_loka_being_cards.json error', e); lokaBeingCards = []; }
  try {
    monadCards = asArray(await fetchJson('data/monad_path_cards.json'));
  } catch(e){ console.warn('cards: monad_path_cards.json error', e); monadCards = []; }

  renderFilters();
  renderCards('all');
  updateCounter();
}

var activeFilter = 'all';
var activeRarity = 'all';
var activeType = 'all';
var activeSearch = '';

function renderFilters(){
  var matrixSelect = document.getElementById('matrix-filter');
  var typeSelect = document.getElementById('type-filter');
  var rarityEl = document.getElementById('rarity-filters');
  var matrixBtns = [{label:'ВСЕ МАТРИЦЫ',val:'all'}];
  matrices.forEach(function(m){ matrixBtns.push({label:m.name,val:m.slug}); });
  var rarityBtns = [{label:'ЛЮБАЯ РАРНОСТЬ',val:'all'}].concat(Object.keys(RARITY_LABELS).map(function(r){
    return {label:RARITY_LABELS[r],val:r};
  }));
  var typeBtns = [{label:'ВСЕ ТИПЫ',val:'all'}].concat(Object.keys(TYPE_LABELS).map(function(t){
    return {label:TYPE_LABELS[t],val:t};
  }));
  matrixSelect.innerHTML = matrixBtns.map(function(b){
    return '<option value="'+b.val+'"'+(b.val===activeFilter?' selected':'')+'>'+b.label+'</option>';
  }).join('');
  typeSelect.innerHTML = typeBtns.map(function(b){
    return '<option value="'+b.val+'"'+(b.val===activeType?' selected':'')+'>'+b.label+'</option>';
  }).join('');
  rarityEl.innerHTML = rarityBtns.map(function(b){
    return '<div class="filter-btn'+(b.val===activeRarity?' on':'')+'" onclick="setRarityFilter(\''+b.val+'\')">'+b.label+'</div>';
  }).join('');
}

function setFilter(f){
  activeFilter = f;
  renderFilters();
  renderCards(f);
}

function setRarityFilter(f){
  activeRarity = f;
  renderFilters();
  renderCards(activeFilter);
}

function setTypeFilter(f){
  activeType = f;
  renderFilters();
  renderCards(activeFilter);
}

function setCardSearch(value){
  activeSearch = String(value || '').trim().toLowerCase();
  renderCards(activeFilter);
}

function renderCards(filter){
  var grid = document.getElementById('cards-grid');
  var html = '';
  if(activeType === 'all' || activeType === 'core'){
    Object.keys(cardPrompts).forEach(function(cid){
      if(cid.indexOf('__') !== -1) return;
      var prompt = cardPrompts[cid] || {};
      var rarity = prompt.rarity || 'common';
      if(activeRarity !== 'all' && activeRarity !== rarity) return;
      var owned = !!collected[cid];
      var title = prompt.card_name || prompt.name || cid;
      var matrixName = prompt.matrix_name || prompt.matrix || 'PROMPT';
      var element = prompt.element || 'Эфир';
      if(activeSearch && (title + ' ' + matrixName + ' ' + element + ' ' + cid).toLowerCase().indexOf(activeSearch) === -1) return;
      html += '<div class="card rarity-'+rarity+' '+(owned?'owned':'locked')+'" onclick="showPromptCard(\''+cid+'\')">' +
        '<div class="rarity-badge '+rarity+'">'+(RARITY_LABELS[rarity] || rarity).slice(0,4)+'</div>' +
        (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
        '<div class="card-el">'+(EL_ICO[element] || '✦')+'</div>' +
        '<div class="card-name">'+(owned ? title : '???')+'</div>' +
        '<div class="card-matrix">'+String(matrixName).toUpperCase()+'</div>' +
        '<div class="card-element">PROMPT · '+element+'</div>' +
        '</div>';
    });
  }
  if(activeType === 'all' || activeType === 'core'){
    agents.forEach(function(a){
      MATRICES.forEach(function(m){
        var matrix = matrices.find(function(x){ return x.name === m; }) || {};
        if(filter !== 'all' && filter !== matrix.slug) return;
        var cid = cardId(a.slug, matrix.slug);
        var prompt = cardPrompts[cid] || {};
        var rarity = prompt.rarity || 'common';
        if(activeRarity !== 'all' && activeRarity !== rarity) return;
        var owned = !!collected[cid];
        var elIcon = EL_ICO[a.element] || '✦';
        if(activeSearch && (a.name + ' ' + m + ' ' + a.element + ' ' + cid).toLowerCase().indexOf(activeSearch) === -1) return;
        html += '<div class="card rarity-'+rarity+' '+(owned?'owned':'locked')+'" onclick="showCoreCard(\''+a.slug+'\',\''+matrix.slug+'\')">' +
          '<div class="rarity-badge '+rarity+'">'+(RARITY_LABELS[rarity] || rarity).slice(0,4)+'</div>' +
          (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
          '<div class="card-el">'+elIcon+'</div>' +
          '<div class="card-name">'+(owned ? a.name : '???')+'</div>' +
          '<div class="card-matrix">'+m.toUpperCase()+'</div>' +
          '<div class="card-element">ЯДРО · '+a.element+'</div>' +
          '</div>';
      });
    });
  }
  monadCards.forEach(function(c){
    if(activeType !== 'all' && activeType !== c.card_type) return;
    if(activeRarity !== 'all' && activeRarity !== c.rarity) return;
    var owned = !!collected[c.card_id];
    html += '<div class="card rarity-'+c.rarity+' '+(owned?'owned':'locked')+'" onclick="showMonadCard(\''+c.card_id+'\')">' +
      '<div class="rarity-badge '+c.rarity+'">'+(RARITY_LABELS[c.rarity] || c.rarity).slice(0,4)+'</div>' +
      (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
      '<div class="card-el">🌀</div>' +
      '<div class="card-name">'+(owned ? c.display_name : '???')+'</div>' +
      '<div class="card-matrix">ПУТЬ МОНАДЫ</div>' +
      '<div class="card-element">'+String(c.category || '').toUpperCase()+' · '+(c.element || 'Эфир')+'</div>' +
      '</div>';
  });
  domainCards.forEach(function(c){
    if(activeType !== 'all' && activeType !== c.card_type) return;
    if(activeRarity !== 'all' && activeRarity !== c.rarity) return;
    var owned = !!collected[c.card_id];
    html += '<div class="card rarity-'+c.rarity+' '+(owned?'owned':'locked')+'" onclick="showDomainCard(\''+c.card_id+'\')">' +
      '<div class="rarity-badge '+c.rarity+'">'+(RARITY_LABELS[c.rarity] || c.rarity).slice(0,4)+'</div>' +
      (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
      '<div class="card-el">🌌</div>' +
      '<div class="card-name">'+(owned ? c.display_name : '???')+'</div>' +
      '<div class="card-matrix">'+String(c.agent_name || '').toUpperCase()+'</div>' +
      '<div class="card-element">ДОМЕН · '+(c.element || 'Эфир')+'</div>' +
      '</div>';
  });
  lokaCards.forEach(function(c){
    if(activeType !== 'all' && activeType !== c.card_type) return;
    if(activeRarity !== 'all' && activeRarity !== c.rarity) return;
    if(filter !== 'all' && filter !== c.matrix_slug) return;
    var owned = !!collected[c.card_id];
    html += '<div class="card rarity-'+c.rarity+' '+(owned?'owned':'locked')+'" onclick="showLokaCard(\''+c.card_id+'\')">' +
      '<div class="rarity-badge '+c.rarity+'">'+(RARITY_LABELS[c.rarity] || c.rarity).slice(0,4)+'</div>' +
      (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
      '<div class="card-el">🪷</div>' +
      '<div class="card-name">'+(owned ? c.display_name : '???')+'</div>' +
      '<div class="card-matrix">'+String(c.matrix_name || '').toUpperCase()+'</div>' +
      '<div class="card-element">ЛОКА · '+(c.element || 'Эфир')+'</div>' +
      '</div>';
  });
  lokaBeingCards.forEach(function(c){
    if(activeType !== 'all' && activeType !== c.card_type) return;
    if(activeRarity !== 'all' && activeRarity !== c.rarity) return;
    if(filter !== 'all' && filter !== c.matrix_slug) return;
    var owned = !!collected[c.card_id];
    html += '<div class="card rarity-'+c.rarity+' '+(owned?'owned':'locked')+'" onclick="showLokaBeingCard(\''+c.card_id+'\')">' +
      '<div class="rarity-badge '+c.rarity+'">'+(RARITY_LABELS[c.rarity] || c.rarity).slice(0,4)+'</div>' +
      (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
      '<div class="card-el">🐍</div>' +
      '<div class="card-name">'+(owned ? c.display_name : '???')+'</div>' +
      '<div class="card-matrix">'+String(c.loka_name || '').toUpperCase()+'</div>' +
      '<div class="card-element">СИЛА ЛОКИ · '+(c.element || 'Эфир')+'</div>' +
      '</div>';
  });
  extraCards.forEach(function(c){
    if(activeType !== 'all' && activeType !== c.card_type) return;
    if(activeRarity !== 'all' && activeRarity !== c.rarity) return;
    if(filter !== 'all' && filter !== c.matrix_slug) return;
    var owned = !!collected[c.card_id];
    var elIcon = c.card_type === 'mythic_location' ? '⛰️' : c.card_type === 'mythic_relic' ? '🔱' : (EL_ICO[c.element] || '✦');
    html += '<div class="card rarity-'+c.rarity+' '+(owned?'owned':'locked')+'" onclick="showExtraCard(\''+c.card_id+'\')">' +
      '<div class="rarity-badge '+c.rarity+'">'+(RARITY_LABELS[c.rarity] || c.rarity).slice(0,4)+'</div>' +
      (owned ? '<div class="card-badge">✦</div>' : '<div class="card-locked-ico">🔒</div>') +
      '<div class="card-el">'+elIcon+'</div>' +
      '<div class="card-name">'+(owned ? c.display_name : '???')+'</div>' +
      '<div class="card-matrix">'+String(c.matrix_name || '').toUpperCase()+'</div>' +
      '<div class="card-element">'+(TYPE_LABELS[c.card_type] || c.card_type)+' · '+(c.element || 'Эфир')+'</div>' +
      '</div>';
  });
  grid.innerHTML = html;
}

function showCoreCard(slug, matrixSlug){
  var a = agents.find(function(x){return x.slug===slug;});
  if(!a) return;
  var matrix = matrices.find(function(x){return x.slug===matrixSlug;}) || {};
  var matrixName = matrix.name || matrixSlug;
  var cid = cardId(slug, matrixSlug);
  var prompt = cardPrompts[cid] || {};
  var rarity = prompt.rarity || 'common';
  var owned = !!collected[cid];

  document.getElementById('pop-ico').textContent = EL_ICO[a.element] || '✦';
  document.getElementById('pop-name').textContent = owned ? a.name : '???';
  document.getElementById('pop-matrix').textContent = matrixName.toUpperCase();
  document.getElementById('pop-el').textContent = a.element;
  document.getElementById('pop-zone').textContent = a.vastu_zone || '—';
  document.getElementById('pop-rarity').textContent = RARITY_LABELS[rarity] || rarity;
  document.getElementById('pop-effect').textContent = MATRIX_EFFECTS[matrixName] || '—';
  document.getElementById('pop-status').textContent = owned ? '✦ В КОЛЛЕКЦИИ' : '🔒 НЕ НАЙДЕНА';
  document.getElementById('pop-status').style.color = owned ? '#c9a84c' : 'rgba(255,255,255,0.3)';

  document.getElementById('card-popup').classList.add('show');
}

function showPromptCard(cardId){
  var p = cardPrompts[cardId] || {};
  var owned = !!collected[cardId];
  document.getElementById('pop-ico').textContent = EL_ICO[p.element] || '✦';
  document.getElementById('pop-name').textContent = owned ? (p.card_name || p.name || cardId) : '???';
  document.getElementById('pop-matrix').textContent = String(p.matrix_name || p.matrix || 'PROMPT').toUpperCase();
  document.getElementById('pop-el').textContent = p.element || 'Эфир';
  document.getElementById('pop-zone').textContent = p.vastu_zone || p.card_type || 'PROMPT';
  document.getElementById('pop-rarity').textContent = RARITY_LABELS[p.rarity] || p.rarity || 'common';
  document.getElementById('pop-effect').textContent = p.game_effect || p.effect || p.prompt || 'визуальный промпт карты';
  document.getElementById('pop-status').textContent = owned ? '✦ В КОЛЛЕКЦИИ' : '🔒 НЕ НАЙДЕНА';
  document.getElementById('pop-status').style.color = owned ? '#c9a84c' : 'rgba(255,255,255,0.3)';
  document.getElementById('card-popup').classList.add('show');
}

  document.getElementById('pop-ico').textContent = c.card_type === 'mythic_location' ? '⛰️' : c.card_type === 'mythic_relic' ? '🔱' : (EL_ICO[c.element] || '✦');

  document.getElementById('card-popup').classList.add('show');
}

function updateCounter(){
  var total = Object.keys(cardPrompts).length + agents.length * MATRICES.length + extraCards.length + domainCards.length + lokaCards.length + lokaBeingCards.length + monadCards.length;
  var count = Object.keys(collected).length;
  document.getElementById('counter').innerHTML = 'Собрано: <b>'+count+'</b> / '+total;
}

function unlockDemoDeck(){
  Object.keys(cardPrompts).forEach(function(cid){
    collected[cid] = true;
  });
  agents.forEach(function(a){
    matrices.forEach(function(m){
      collected[cardId(a.slug, m.slug)] = true;
    });
  });
  [extraCards, domainCards, lokaCards, lokaBeingCards, monadCards].forEach(function(list){
    list.forEach(function(c){ if(c.card_id) collected[c.card_id] = true; });
  });
  saveCollected();
  renderCards(activeFilter);
  updateCounter();
}
