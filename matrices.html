<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>33 Матрицы · AWARA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Cinzel&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#02010a;color:#d4d4d4;font-family:'JetBrains Mono',monospace;min-height:100vh;padding:20px 10px 100px}
.container{max-width:1200px;margin:0 auto}
.title{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,4vw,36px);color:#ffe080;text-align:center;letter-spacing:.3em;margin-bottom:30px}
.tier{margin-bottom:40px}
.tier-h{display:flex;gap:10px;align-items:center;padding:10px;background:rgba(201,168,76,.08);border-left:4px solid #c9a84c;margin-bottom:15px}
.tier-num{font-family:Cinzel,serif;font-size:24px;color:#c9a84c;font-weight:700}
.tier-name{font-family:Cinzel,serif;font-size:14px;color:#ffe080;letter-spacing:.15em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
.card{background:rgba(20,20,30,.8);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:15px;cursor:pointer;transition:.3s;position:relative}
.card:hover{border-color:rgba(201,168,76,.6);transform:translateY(-3px)}
.card.locked{opacity:.4;cursor:not-allowed}
.card.locked:hover{transform:none}
.card.active{border-color:#ffe080;box-shadow:0 0 20px rgba(255,224,128,.3);background:rgba(201,168,76,.1)}
.icon{font-size:40px;text-align:center;margin-bottom:10px}
.name{font-family:Cinzel,serif;font-size:14px;color:#ffe080;text-align:center;margin-bottom:5px}
.cat{font-size:9px;text-align:center;color:rgba(201,168,76,.5);margin-bottom:10px;text-transform:uppercase}
.prog{margin-bottom:8px}
.prog-label{display:flex;justify-content:space-between;font-size:8px;color:rgba(201,168,76,.6);margin-bottom:3px}
.prog-bar{height:5px;background:rgba(20,20,30,.8);border-radius:3px;overflow:hidden;border:1px solid rgba(201,168,76,.2)}
.prog-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#ffe080);transition:width .5s}
.stats{display:flex;gap:8px;font-size:8px;color:rgba(201,168,76,.7)}
.stat{flex:1;text-align:center;padding:5px;background:rgba(201,168,76,.05);border-radius:3px}
.stat-val{color:#ffe080;font-weight:600;display:block;margin-top:2px}
.badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:10px;font-size:7px;letter-spacing:.1em;font-weight:600}
.badge.locked{background:rgba(100,100,120,.2);color:rgba(150,150,170,.8)}
.badge.active{background:rgba(255,224,128,.2);color:#ffe080;border:1px solid rgba(255,224,128,.4)}
.badge.available{background:rgba(100,220,200,.1);color:rgba(100,220,200,.8)}
.back{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 30px;background:rgba(201,168,76,.15);border:2px solid #c9a84c;border-radius:6px;color:#c9a84c;font-family:Cinzel,serif;font-size:11px;letter-spacing:.2em;cursor:pointer;z-index:1000}
.back:hover{background:rgba(201,168,76,.25);border-color:#ffe080}
</style>
</head>
<body>
<div class="container">
<div class="title">33 МАТРИЦЫ ИНИЦИАЦИЙ</div>
<div class="tier"><div class="tier-h"><div class="tier-num">I</div><div class="tier-name">ПРИРОДНЫЕ</div></div><div class="grid" id="t1"></div></div>
<div class="tier"><div class="tier-h"><div class="tier-num">II</div><div class="tier-name">ХРАМОВЫЕ</div></div><div class="grid" id="t2"></div></div>
<div class="tier"><div class="tier-h"><div class="tier-num">III</div><div class="tier-name">МИСТИЧЕСКИЕ</div></div><div class="grid" id="t3"></div></div>
<div class="tier"><div class="tier-h"><div class="tier-num">IV</div><div class="tier-name">КВАНТОВЫЕ</div></div><div class="grid" id="t4"></div></div>
<div class="tier"><div class="tier-h"><div class="tier-num">V</div><div class="tier-name">ИСХОДНЫЙ КОД</div></div><div class="grid" id="t5"></div></div>
</div>
<button class="back" onclick="location.href='index.html'">← ЛОББИ</button>
<script>
const M={
t1:[{i:'shamanistic',c:'🪶',n:'Шаманская',g:'Первобытная',l:12,m:20,u:1},{i:'slavic',c:'⚡',n:'Славянская',g:'Языческая',l:8,m:20,u:1},{i:'scandinavian',c:'⚔️',n:'Скандинавская',g:'Рунная',l:5,m:20,u:1},{i:'celtic',c:'🌿',n:'Кельтская',g:'Друидская',l:3,m:20,u:0},{i:'african',c:'🥁',n:'Африканская',g:'Племенная',l:0,m:20,u:0},{i:'polynesian',c:'🌊',n:'Полинезийская',g:'Океаническая',l:0,m:20,u:0}],
t2:[{i:'vedic',c:'ॐ',n:'Ведическая',g:'Санатана',l:15,m:20,u:1},{i:'egyptian',c:'𓂀',n:'Египетская',g:'Герметическая',l:7,m:20,u:1},{i:'greek',c:'⚡',n:'Античная',g:'Олимпийская',l:4,m:20,u:0},{i:'buddhist',c:'☸',n:'Буддийская',g:'Дхарма',l:6,m:20,u:1},{i:'confucian',c:'☯',n:'Конфуцианская',g:'Порядок',l:0,m:20,u:0},{i:'mayan',c:'🌞',n:'Майянская',g:'Календарная',l:2,m:20,u:0}],
t3:[{i:'alchemical',c:'🜃',n:'Алхимическая',g:'Трансмутация',l:10,m:20,u:1},{i:'kabbalistic',c:'✡',n:'Каббалистическая',g:'Древо Жизни',l:8,m:20,u:1},{i:'taoist',c:'☯',n:'Даосская',g:'У-Син',l:11,m:20,u:1},{i:'sufi',c:'☪',n:'Суфийская',g:'Ишк',l:5,m:20,u:0},{i:'gnostic',c:'⊕',n:'Гностическая',g:'София',l:3,m:20,u:0},{i:'tantra',c:'🕉',n:'Тантрическая',g:'Шакти',l:9,m:20,u:1}],
t4:[{i:'technomagic',c:'⚙️',n:'Техномагическая',g:'Киберпанк',l:14,m:20,u:1},{i:'ai',c:'🤖',n:'AI-Матрица',g:'Сингулярность',l:12,m:20,u:1},{i:'galactic',c:'🌌',n:'Галактическая',g:'Космос',l:4,m:20,u:0},{i:'iching',c:'☷',n:'И-Цзин',g:'64 Гексаграммы',l:7,m:20,u:1},{i:'enochian',c:'👁',n:'Енохианская',g:'Ангельская',l:0,m:20,u:0},{i:'fractal',c:'◈',n:'Фрактальная',g:'Геометрия',l:6,m:20,u:0}],
t5:[{i:'laya',c:'◎',n:'Лайя-Адвайта',g:'Недуальность',l:3,m:20,u:0},{i:'dzogchen',c:'⊚',n:'Дзогчен',g:'Ригпа',l:1,m:20,u:0},{i:'kashmir',c:'🔱',n:'Кашмир Шиваизм',g:'Спанда',l:5,m:20,u:0}]
};
let a=localStorage.getItem('awara_active_matrix')||'vedic';
Object.keys(M).forEach(t=>{
const d=document.getElementById(t);
M[t].forEach(m=>{
const p=(m.l/m.m*100).toFixed(0);
const s=m.i===a?'active':m.u?'available':'locked';
const st=m.i===a?'АКТИВНА':m.u?'ДОСТУПНА':'ЗАБЛОКИРОВАНА';
const c=document.createElement('div');
c.className=`card ${!m.u?'locked':''} ${m.i===a?'active':''}`;
c.innerHTML=`<div class="badge ${s}">${st}</div><div class="icon">${m.c}</div><div class="name">${m.n}</div><div class="cat">${m.g}</div><div class="prog"><div class="prog-label"><span>LVL ${m.l}/${m.m}</span><span>${p}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div></div><div class="stats"><div class="stat">ИНИЦИАЦИИ<span class="stat-val">${m.l}</span></div><div class="stat">КЛЮЧИ<span class="stat-val">${Math.floor(m.l*1.5)}</span></div></div>`;
if(m.u)c.onclick=()=>{a=m.i;localStorage.setItem('awara_active_matrix',m.i);['t1','t2','t3','t4','t5'].forEach(x=>document.getElementById(x).innerHTML='');Object.keys(M).forEach(t=>{const d=document.getElementById(t);M[t].forEach(m=>{const p=(m.l/m.m*100).toFixed(0);const s=m.i===a?'active':m.u?'available':'locked';const st=m.i===a?'АКТИВНА':m.u?'ДОСТУПНА':'ЗАБЛОКИРОВАНА';const c=document.createElement('div');c.className=`card ${!m.u?'locked':''} ${m.i===a?'active':''}`;c.innerHTML=`<div class="badge ${s}">${st}</div><div class="icon">${m.c}</div><div class="name">${m.n}</div><div class="cat">${m.g}</div><div class="prog"><div class="prog-label"><span>LVL ${m.l}/${m.m}</span><span>${p}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div></div><div class="stats"><div class="stat">ИНИЦИАЦИИ<span class="stat-val">${m.l}</span></div><div class="stat">КЛЮЧИ<span class="stat-val">${Math.floor(m.l*1.5)}</span></div></div>`;if(m.u)c.onclick=arguments.callee;d.appendChild(c)})});alert('✦ Активирована: '+m.i.toUpperCase()+'\n\nВернись в Тигель.')};
d.appendChild(c)})});
</script>
</body>
</html>
